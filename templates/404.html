{% extends "base.html" %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center">
  <div style="font-size:5rem;font-weight:200;color:var(--navy);line-height:1;margin-bottom:.5rem;letter-spacing:-.05em">404</div>
  <h2 style="font-family:'Newsreader',Georgia,serif;font-weight:400;color:var(--text);margin:0 0 .5rem">Page not found</h2>
  <p style="color:var(--text-muted);max-width:360px;margin:0 0 1.5rem">The page you're looking for doesn't exist or has been moved.</p>
  <div style="display:flex;gap:8px">
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-pill">← Back to Dashboard</a>
    <a href="{{ url_for('equipment_dashboard') }}" class="btn btn-outline-secondary btn-pill">Equipment</a>
  </div>
</div>
{% endblock %}
